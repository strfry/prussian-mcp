function t(key, vars = {}) {
  let text = i18n[currentLang]?.[key] || i18n["de"]?.[key] || key;
  for (const [k, v] of Object.entries(vars)) {
    text = text.replace(`{${k}}`, v);
  }
  return text;
}

// в”Ђв”Ђ Dictionary Search (like search.sh) в”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђ
function normalize(text) {
  if (!text) return '';
  const replacements = {'ДЃ':'a','Д“':'e','Д«':'i','ЕЌ':'o','Е«':'u','ГЈ':'a','бєЅ':'e','Д©':'i','Гµ':'o','Е©':'u'};
  return text.toLowerCase().split('').map(c => replacements[c] || c).join('');
}

function extractAllForms(entry) {
  const forms = new Set();
  
  // Declension forms
  if (entry.forms?.declension) {
    entry.forms.declension.forEach(decl => {
      (decl.cases || []).forEach(c => {
        if (c.singular) forms.add(c.singular.toLowerCase());
        if (c.plural) forms.add(c.plural.toLowerCase());
      });
    });
  }
  
  // Conjugation forms (all moods)
  if (entry.forms?.indicative && Array.isArray(entry.forms.indicative)) {
    // Indicative has tense groups
    entry.forms.indicative.forEach(tenseGroup => {
      if (Array.isArray(tenseGroup.forms)) {
        tenseGroup.forms.forEach(f => {
          if (f && f.form) forms.add(f.form.toLowerCase());
        });
      }
    });
  }
  
  // Other moods are direct arrays of {pronoun, form}
  ['subjunctive', 'optative', 'imperative'].forEach(mood => {
    if (entry.forms?.[mood] && Array.isArray(entry.forms[mood])) {
      entry.forms[mood].forEach(item => {
        if (item && item.form) forms.add(item.form.toLowerCase());
      });
    }
  });
  
  // Participles and infinitives
  ['participles', 'infinitives'].forEach(type => {
    if (entry.forms?.[type]) {
      entry.forms[type].forEach(item => {
        if (item.form) forms.add(item.form.toLowerCase());
      });
    }
  });
  
  return forms;
}

function matchesQuery(entry, queryWords) {
  const qNorm = queryWords.map(q => normalize(q));
  
  // Match in Prussian lemma
  const word = (entry.word || '').toLowerCase();
  const wordNorm = normalize(word);
  if (queryWords.some(q => word.includes(q) || wordNorm.includes(normalize(q)))) {
    return true;
  }
  
  // Match in all inflected forms
  const forms = extractAllForms(entry);
  for (const form of forms) {
    if (queryWords.some(q => form.includes(q) || normalize(form).includes(normalize(q)))) {
      return true;
    }
  }
  
  // Match in translations (German, English, Lithuanian)
  for (const lang of ['miks', 'engl', 'leit']) {
    const translations = entry.translations?.[lang] || [];
    for (const trans of translations) {
      const tLower = trans.toLowerCase();
      const tNorm = normalize(tLower);
      const words = tLower.split(/[\s,;]+/);
      
      if (queryWords.some(q => tLower.includes(q) || tNorm.includes(normalize(q)))) {
        return true;
      }
      
      // Word-level matching
      for (const w of words) {
        if (queryWords.some(q => w.includes(q) || q.includes(w))) {
          return true;
        }
      }
    }
  }
  
  return false;
}

function lookup(query) {
  if (!dictEntries || dictEntries.length === 0) return { results: [], words: [] };
  
  const queryWords = query.toLowerCase().split(/[\s,?.!;:]+/).filter(t => t.length > 0);
  if (queryWords.length === 0) return { results: [], words: [] };
  
  // Check if any query word is short (< 4 chars) в†’ use prefix matching
  const hasShortQuery = queryWords.some(q => q.length < 4);
  
  // Rank results by relevance (exact > forms > translations)
  const ranked = dictEntries.map(e => {
    let score = 0;
    const word = (e.word || '').toLowerCase();
    const wordNorm = normalize(word);
    
    // For short queries: strict prefix matching on lemma
    if (hasShortQuery) {
      // Exact match or prefix match on lemma
      if (queryWords.some(q => word === q || wordNorm === normalize(q))) score += 1000;
      else if (queryWords.some(q => word.startsWith(q) || wordNorm.startsWith(normalize(q)))) score += 500;
      
      // Still match in forms/translations normally
      const forms = extractAllForms(e);
      for (const form of forms) {
        if (queryWords.some(q => form === q || normalize(form) === normalize(q))) score += 100;
      }
      
      for (const lang of ['miks', 'engl', 'leit']) {
        const translations = e.translations?.[lang] || [];
        for (const trans of translations) {
          const tLower = trans.toLowerCase();
          const words = tLower.split(/[\s,;]+/);
          for (const w of words) {
            if (queryWords.some(q => w === q)) score += 20;
          }
        }
      }
    } else {
      // For longer queries: normal substring matching
      if (queryWords.some(q => word === q || wordNorm === normalize(q))) score += 1000;
      else if (queryWords.some(q => word.includes(q) || wordNorm.includes(normalize(q)))) score += 500;
      
      const forms = extractAllForms(e);
      for (const form of forms) {
        if (queryWords.some(q => form === q || normalize(form) === normalize(q))) score += 100;
        else if (queryWords.some(q => form.includes(q) || normalize(form).includes(normalize(q)))) score += 50;
      }
      
      for (const lang of ['miks', 'engl', 'leit']) {
        const translations = e.translations?.[lang] || [];
        for (const trans of translations) {
          const tLower = trans.toLowerCase();
          const words = tLower.split(/[\s,;]+/);
          for (const w of words) {
            if (queryWords.some(q => w === q)) score += 20;
            else if (queryWords.some(q => w.includes(q))) score += 5;
          }
        }
      }
    }
    
    return { entry: e, score };
  });
  
  // Filter and sort by score
  const results = ranked
    .filter(r => r.score > 0)
    .sort((a, b) => b.score - a.score)
    .slice(0, MAX_HITS)
    .map(r => r.entry);
  
  const mapped = results.map(e => {
    const cas = e.forms?.declension?.[0]?.cases || [];
    const f = n => cas.find(c => c.case === n);
    return {
      word: e.word, 
      paradigm: e.paradigm,
      gender: e.gender || undefined, 
      desc: e.desc || undefined,
      de: e.translations?.miks, 
      en: e.translations?.engl, 
      lt: e.translations?.leit,
      nom_sg: f("Nominative")?.singular, 
      gen_sg: f("Genitive")?.singular,
      dat_sg: f("Dative")?.singular,     
      acc_sg: f("Accusative")?.singular,
      nom_pl: f("Nominative")?.plural,
      gen_pl: f("Genitive")?.plural,
      dat_pl: f("Dative")?.plural,
      acc_pl: f("Accusative")?.plural,
      present: e.forms?.indicative?.[0]?.forms,
      past:    e.forms?.indicative?.[1]?.forms,
      imperative: e.forms?.imperative,
    };
  }).filter(e => e.de || e.en);
  
  return {
    results: mapped,
    words: mapped.map(e => e.word)
  };
}

// в”Ђв”Ђ System prompt в”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђ
function makeSystem(hits) {
  const block = hits.length
    ? "\n\n" + t("system.block") + "\n" + JSON.stringify(hits, null, 1)
    : "";
  const shortWords = "\n\n" + t("system.short_words");
  return t("system.intro") + "\n\n" + t("system.rules") + shortWords + block;
}

// в”Ђв”Ђ API call в”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђ
async function callAPI(system) {
  const res = await fetch(PROXY_URL, {
    method: "POST",
    headers: { "Content-Type": "application/json" },
    body: JSON.stringify({
      model: "claude-sonnet-4-20250514",
      max_tokens: 1000,
      system,
      messages: history.map(({ role, content }) => ({ role, content })),
    }),
  });
  if (!res.ok) {
    const err = await res.json().catch(() => ({}));
    throw new Error(err.error?.message || `HTTP ${res.status}`);
  }
  const data = await res.json();
  return data.content?.filter(b => b.type === "text").map(b => b.text).join("\n") || "";
}

// в”Ђв”Ђ UI helpers в”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђ
const chat  = document.getElementById("chat");
const input = document.getElementById("input");
const btn   = document.getElementById("send");
const errEl = document.getElementById("error");
const status = document.getElementById("dict-status");
const langIcon = document.getElementById("lang-icon");
const langMenu = document.getElementById("lang-menu");
const langButtons = langMenu.querySelectorAll("button");

// Language selector logic
langIcon.addEventListener("click", () => {
  langMenu.classList.toggle("open");
});

langButtons.forEach(btn => {
  btn.addEventListener("click", () => {
    const newLang = btn.dataset.lang;
    if (newLang !== currentLang) {
      currentLang = newLang;
      localStorage.setItem("preusDictLang", newLang);
      updateUI();
    }
    langMenu.classList.remove("open");
  });
});

function getLangIcon(lang) {
  return lang === "lt" ? "рџ‡±рџ‡№" : "рџ‡©рџ‡Є";
}

function updateUI() {
  // Update language icon
  langIcon.textContent = getLangIcon(currentLang);
  
  // Update active language button
  langButtons.forEach(btn => {
    btn.classList.toggle("active", btn.dataset.lang === currentLang);
  });
  
  // Update input placeholder
  input.placeholder = t("input.placeholder");
  
  // Update intro if chat is empty
  if (!chat.querySelector(".msg")) {
    showIntro();
  }
  
  // Update status if dictionary loaded
  if (dictEntries.length > 0) {
    status.textContent = t("dict.loaded", { count: dictEntries.length.toLocaleString() });
  }
}

function clearEmpty() {
  const e = chat.querySelector(".empty");
  if (e) e.remove();
}

function showIntro() {
  clearEmpty();
  const intro = document.createElement("div");
  intro.className = "empty";
  intro.innerHTML = `<div class="icon">вљЎ</div>
    ${t("intro.line1")}<br>
    <span style="font-size:13px">${t("intro.line2")}</span>`;
  chat.appendChild(intro);
}

function addMsg(role, prussian, german, words) {
  clearEmpty();
  const div = document.createElement("div");
  div.className = "msg " + (role === "user" ? "user" : "bot");
  
  if (role === "bot") {
    div.innerHTML = `<div class="avatar">рџЏє</div>
      <div class="bubble">
        <div>${prussian.replace(/\n/g, "<br>")}</div>
        ${german ? `<div class="translation">${t("translation.prefix")} ${german}</div>` : ""}
      </div>`;
    
    // Add dictionary hits with tooltip
    if (Array.isArray(words) && words.length > 0) {
      const bubble = div.querySelector('.bubble');
      const hitsDiv = document.createElement('div');
      hitsDiv.className = 'dict-hits';
      hitsDiv.textContent = t("hits.label", { count: words.length });
      
      // Create tooltip
      const tooltip = document.createElement('span');
      tooltip.className = 'tooltip';
      tooltip.textContent = words.join(', ');
      hitsDiv.appendChild(tooltip);
      
      bubble.appendChild(hitsDiv);
    }
  } else {
    div.innerHTML = `<div class="bubble">${prussian}</div>`;
  }
  
  chat.appendChild(div);
  chat.scrollTop = chat.scrollHeight;
}

function showTyping() {
  const d = document.createElement("div");
  d.className = "typing"; d.id = "typing";
  d.innerHTML = `<span>рџЏє</span><span>${t("typing")}</span>
    <div class="dots"><div class="dot"></div><div class="dot"></div><div class="dot"></div></div>`;
  chat.appendChild(d); chat.scrollTop = chat.scrollHeight;
}
function hideTyping() { document.getElementById("typing")?.remove(); }

function showError(msg) { errEl.textContent = t("error.prefix") + msg; errEl.style.display = "block"; }
function hideError()    { errEl.style.display = "none"; }

function parseMsg(text) {
  // Match both [DE: ...] and [LT: ...]
  const deMatch = text.match(/\[DE:\s*([\s\S]*?)\]$/m);
  const ltMatch = text.match(/\[LT:\s*([\s\S]*?)\]$/m);
  const translation = deMatch?.[1] || ltMatch?.[1];
  
  // Remove translation tag from text
  const prussian = text.replace(/\[(DE|LT):\s*[\s\S]*?\]$/m, "").trim();
  
  return { prussian, german: translation?.trim() };
}

function setUI(enabled) {
  input.disabled = !enabled; btn.disabled = !enabled || !input.value.trim();
}

// в”Ђв”Ђ Send в”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђ
async function send() {
  const text = input.value.trim();
  if (!text || busy) return;
  busy = true; hideError();
  input.value = ""; setUI(false);

  addMsg("user", text);
  history.push({ role: "user", content: text });

  const lookup_result = lookup(text);
  showTyping();

  try {
    const raw = await callAPI(makeSystem(lookup_result.results));
    hideTyping();
    const { prussian, german } = parseMsg(raw);
    history.push({ role: "assistant", content: raw });
    addMsg("bot", prussian, german, lookup_result.words);
  } catch(e) {
    hideTyping(); showError(e.message);
    history.pop();
  }

  busy = false; setUI(true); input.focus();
}

btn.addEventListener("click", send);
input.addEventListener("keydown", e => { if (e.key === "Enter" && !e.shiftKey) send(); });
input.addEventListener("input", () => { btn.disabled = !input.value.trim() || busy; });

// в”Ђв”Ђ Detect language from browser/localStorage в”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђ
function detectBrowserLanguage() {
  // Priority: 1. localStorage, 2. browser preference, 3. default
  const stored = localStorage.getItem("preusDictLang");
  if (stored) return stored;
  
  // Check Accept-Language header
  const acceptLang = navigator.language || navigator.userLanguage || "";
  const langPref = acceptLang.toLowerCase();
  
  // Prefer Lithuanian if Accept-Language starts with 'lt'
  if (langPref.startsWith("lt")) return "lt";
  
  // Prefer German if it starts with 'de', 'at' (Austria), 'ch' (Switzerland)
  if (langPref.startsWith("de") || langPref.startsWith("at") || langPref.startsWith("ch")) return "de";
  
  // For all other languages (including Ukrainian 'uk', Russian 'ru', etc.): fallback to Lithuanian
  if (langPref.length > 0 && !langPref.startsWith("en")) return "lt";
  
  // Default: German
  return "de";
}

currentLang = detectBrowserLanguage();
updateUI();

// в”Ђв”Ђ Load dictionary в”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђ
status.textContent = t("dict.loading");
fetch(DICT_URL)
  .then(r => { if (!r.ok) throw new Error("HTTP " + r.status); return r.json(); })
  .then(data => {
    dictEntries = Array.isArray(data) ? data : (data.words || data.entries || Object.values(data));
    status.style.color = "#5a9";
    status.textContent = t("dict.loaded", { count: dictEntries.length.toLocaleString() });
    setUI(true); input.focus();
  })
  .catch(e => {
    status.style.color = "#c55";
    status.textContent = t("dict.error", { error: e.message });
    setUI(true); // noch ohne WГ¶rterbuch nutzbar
  });
</script>
