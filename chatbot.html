<!DOCTYPE html>
<html lang="de">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Prūsiskan Balsenis</title>
<style>
  * { box-sizing: border-box; margin: 0; padding: 0; }
  body {
    font-family: Georgia, serif;
    background: linear-gradient(160deg, #f7f0e2 0%, #ede2c8 100%);
    min-height: 100vh; display: flex; flex-direction: column;
    align-items: center;
  }
  #app {
    width: 100%; max-width: 700px; min-height: 100vh;
    display: flex; flex-direction: column;
  }
  header {
    background: linear-gradient(135deg, #3b2408, #6b3d11);
    color: #f5dfa0; padding: 16px 20px 12px;
    box-shadow: 0 2px 8px rgba(0,0,0,.3);
    display: flex; justify-content: space-between; align-items: flex-start;
  }
  header h1 { font-size: 21px; letter-spacing: 1px; }
  #lang-selector {
    position: relative;
  }
  #lang-icon {
    font-size: 20px; cursor: pointer; user-select: none;
    transition: opacity .2s;
  }
  #lang-icon:hover { opacity: .7; }
  #lang-menu {
    display: none; position: absolute; top: 28px; right: 0;
    background: #2c1a06; border-radius: 8px; overflow: hidden;
    box-shadow: 0 4px 12px rgba(0,0,0,.4); z-index: 100;
    min-width: 120px;
  }
  #lang-menu.open { display: block; }
  #lang-menu button {
    display: block; width: 100%; text-align: left;
    background: none; border: none; color: #f5dfa0;
    padding: 10px 16px; cursor: pointer;
    font-family: sans-serif; font-size: 14px;
    transition: background .2s;
  }
  #lang-menu button:hover { background: rgba(255,255,255,.1); }
  #lang-menu button.active { background: #5a9; color: #2c1a06; font-weight: bold; }
  #dict-status {
    font-size: 11px; margin-top: 4px; font-family: sans-serif;
    color: #c9a84c;
  }
  #chat {
    flex: 1; overflow-y: auto; padding: 16px 16px 8px;
  }
  .empty {
    text-align: center; color: #9a7a50; margin-top: 80px;
    font-style: italic; line-height: 1.9; font-size: 15px;
  }
  .empty .icon { font-size: 32px; margin-bottom: 10px; }
  .msg { display: flex; margin-bottom: 14px; }
  .msg.user { justify-content: flex-end; }
  .bubble {
    padding: 10px 15px; border-radius: 16px;
    max-width: 78%; font-size: 15px; line-height: 1.65;
  }
  .msg.user .bubble {
    background: #3b2408; color: #f5e8c8;
    border-radius: 16px 16px 4px 16px;
  }
  .msg.bot { align-items: flex-end; }
  .msg.bot .avatar { font-size: 22px; margin-right: 8px; }
  .msg.bot .bubble {
    background: white; border: 1px solid #c9a065;
    border-radius: 16px 16px 16px 4px;
    box-shadow: 0 1px 4px rgba(0,0,0,.08);
    color: #2c1a06;
  }
  .translation {
    margin-top: 10px; padding-top: 8px;
    border-top: 1px solid #edd9a0;
    color: #666; font-size: 13px;
    font-family: sans-serif; font-style: italic;
  }
  .dict-hits {
    margin-top: 5px; font-size: 11px;
    color: #bbb; font-family: sans-serif;
    cursor: help; position: relative; user-select: none;
  }
  .dict-hits:hover { color: #999; }
  .dict-hits .tooltip {
    display: none; position: absolute; bottom: 100%; left: 0;
    background: #2c1a06; color: #f5dfa0; padding: 8px 12px;
    border-radius: 8px; font-size: 11.5px; line-height: 1.4;
    box-shadow: 0 2px 12px rgba(0,0,0,.4); margin-bottom: 8px;
    z-index: 10; max-width: 300px; white-space: normal;
    pointer-events: none;
  }
  .dict-hits:hover .tooltip,
  .dict-hits:active .tooltip { display: block; }
  .dict-hits .tooltip::after {
    content: ''; position: absolute; top: 100%; left: 20px;
    border: 6px solid transparent; border-top-color: #2c1a06;
  }
  @media (max-width: 600px) {
    .dict-hits .tooltip { max-width: 220px; font-size: 10.5px; }
  }
  .typing {
    display: flex; align-items: center; gap: 10px;
    color: #9a7050; font-style: italic;
    font-size: 14px; font-family: sans-serif;
    margin-bottom: 10px;
  }
  .dots { display: flex; gap: 3px; }
  .dot {
    width: 6px; height: 6px; border-radius: 50%;
    background: #c9a065; animation: pulse 1.2s ease-in-out infinite;
  }
  .dot:nth-child(2) { animation-delay: .2s; }
  .dot:nth-child(3) { animation-delay: .4s; }
  @keyframes pulse {
    0%,100% { opacity:.3; transform:scale(.8); }
    50%      { opacity:1;  transform:scale(1.2); }
  }
  #error {
    background: #fde8e8; border: 1px solid #e09090;
    border-radius: 8px; padding: 8px 12px;
    font-size: 13px; color: #a33; font-family: sans-serif;
    margin: 4px 0;
  }
  #input-row {
    display: flex; gap: 8px; padding: 8px 16px 16px;
  }
  #input-row input {
    flex: 1; padding: 11px 15px; border-radius: 12px;
    border: 1px solid #c9a065; font-size: 15px;
    background: #fffdf5; font-family: Georgia, serif;
    color: #2c1a06; outline: none;
  }
  #input-row input:disabled { opacity: .6; }
  #input-row button {
    background: #3b2408; color: #f5dfa0;
    border: none; border-radius: 12px;
    padding: 11px 20px; cursor: pointer;
    font-size: 15px; font-family: sans-serif;
    transition: background .2s;
  }
  #input-row button:disabled { background: #a08060; cursor: not-allowed; }
</style>
</head>
<body>
<div id="app">
  <header>
    <div>
      <h1>🏛 Kunstisks Intellekts</h1>
      <div id="dict-status">● Lade Wörterbuch…</div>
    </div>
    <div id="lang-selector">
      <div id="lang-icon">🇩🇪</div>
      <div id="lang-menu">
        <button data-lang="de">🇩🇪 Deutsch</button>
        <button data-lang="lt">🇱🇹 Lietuvių</button>
      </div>
    </div>
  </header>
  <div id="chat"></div>
  <div id="error" style="display:none;margin:0 16px"></div>
  <div id="input-row">
    <input id="input" type="text" disabled>
    <button id="send" disabled>➤</button>
  </div>
</div>

<script src="/scripts/chatbot.js"></script>
</body>
</html>
