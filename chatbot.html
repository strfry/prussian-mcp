<!DOCTYPE html>
<html lang="de">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Prūsiskan Balsenis</title>
<style>
  * { box-sizing: border-box; margin: 0; padding: 0; }
  body {
    font-family: Georgia, serif;
    background: linear-gradient(160deg, #f7f0e2 0%, #ede2c8 100%);
    min-height: 100vh; display: flex; flex-direction: column;
    align-items: center;
  }
  #app {
    width: 100%; max-width: 700px; min-height: 100vh;
    display: flex; flex-direction: column;
  }
  header {
    background: linear-gradient(135deg, #3b2408, #6b3d11);
    color: #f5dfa0; padding: 16px 20px 12px;
    box-shadow: 0 2px 8px rgba(0,0,0,.3);
  }
  header h1 { font-size: 21px; letter-spacing: 1px; }
  #dict-status {
    font-size: 11px; margin-top: 4px; font-family: sans-serif;
    color: #c9a84c;
  }
  #chat {
    flex: 1; overflow-y: auto; padding: 16px 16px 8px;
  }
  .empty {
    text-align: center; color: #9a7a50; margin-top: 80px;
    font-style: italic; line-height: 1.9; font-size: 15px;
  }
  .empty .icon { font-size: 32px; margin-bottom: 10px; }
  .msg { display: flex; margin-bottom: 14px; }
  .msg.user { justify-content: flex-end; }
  .bubble {
    padding: 10px 15px; border-radius: 16px;
    max-width: 78%; font-size: 15px; line-height: 1.65;
  }
  .msg.user .bubble {
    background: #3b2408; color: #f5e8c8;
    border-radius: 16px 16px 4px 16px;
  }
  .msg.bot { align-items: flex-end; }
  .msg.bot .avatar { font-size: 22px; margin-right: 8px; }
  .msg.bot .bubble {
    background: white; border: 1px solid #c9a065;
    border-radius: 16px 16px 16px 4px;
    box-shadow: 0 1px 4px rgba(0,0,0,.08);
    color: #2c1a06;
  }
  .translation {
    margin-top: 10px; padding-top: 8px;
    border-top: 1px solid #edd9a0;
    color: #666; font-size: 13px;
    font-family: sans-serif; font-style: italic;
  }
  .dict-hits {
    margin-top: 5px; font-size: 11px;
    color: #bbb; font-family: sans-serif;
  }
  .typing {
    display: flex; align-items: center; gap: 10px;
    color: #9a7050; font-style: italic;
    font-size: 14px; font-family: sans-serif;
    margin-bottom: 10px;
  }
  .dots { display: flex; gap: 3px; }
  .dot {
    width: 6px; height: 6px; border-radius: 50%;
    background: #c9a065; animation: pulse 1.2s ease-in-out infinite;
  }
  .dot:nth-child(2) { animation-delay: .2s; }
  .dot:nth-child(3) { animation-delay: .4s; }
  @keyframes pulse {
    0%,100% { opacity:.3; transform:scale(.8); }
    50%      { opacity:1;  transform:scale(1.2); }
  }
  #error {
    background: #fde8e8; border: 1px solid #e09090;
    border-radius: 8px; padding: 8px 12px;
    font-size: 13px; color: #a33; font-family: sans-serif;
    margin: 4px 0;
  }
  #input-row {
    display: flex; gap: 8px; padding: 8px 16px 16px;
  }
  #input-row input {
    flex: 1; padding: 11px 15px; border-radius: 12px;
    border: 1px solid #c9a065; font-size: 15px;
    background: #fffdf5; font-family: Georgia, serif;
    color: #2c1a06; outline: none;
  }
  #input-row input:disabled { opacity: .6; }
  #input-row button {
    background: #3b2408; color: #f5dfa0;
    border: none; border-radius: 12px;
    padding: 11px 20px; cursor: pointer;
    font-size: 15px; font-family: sans-serif;
    transition: background .2s;
  }
  #input-row button:disabled { background: #a08060; cursor: not-allowed; }
</style>
</head>
<body>
<div id="app">
  <header>
    <h1>🏛 Prūsiskan Balsenis</h1>
    <div id="dict-status">● Lade Wörterbuch…</div>
  </header>
  <div id="chat">
    <div class="empty">
      <div class="icon">⚡</div>
      Sprich mich an — auf Deutsch, Litauisch oder Englisch.<br>
      <span style="font-size:13px">Ich antworte auf Altpreußisch, mit deutscher Übersetzung.</span>
    </div>
  </div>
  <div id="error" style="display:none;margin:0 16px"></div>
  <div id="input-row">
    <input id="input" type="text" placeholder="Schreib etwas auf Deutsch oder Englisch…" disabled>
    <button id="send" disabled>➤</button>
  </div>
</div>

<script>
const DICT_URL  = "/prussian_dictionary.json";
const PROXY_URL = "/api_proxy.php";
const MAX_HITS  = 30;

let dictEntries = [], dictIndexes = null, history = [], busy = false;

// ── Index builder ────────────────────────────────────────────────────────
function buildIndexes(entries) {
  const byWord = {}, reverse = {};
  const add = (text, i) => {
    if (!text) return;
    text.toLowerCase().split(/[\s,()[\]/]+/).filter(t => t.length > 2).forEach(t => {
      (reverse[t] = reverse[t] || new Set()).add(i);
    });
  };
  entries.forEach((e, i) => {
    const w = e.word?.toLowerCase();
    if (w) (byWord[w] = byWord[w] || []).push(i);
    (e.translations?.miks || []).forEach(t => add(t, i));
    (e.translations?.engl || []).forEach(t => add(t, i));
    (e.translations?.leit || []).forEach(t => add(t, i));
  });
  return { byWord, reverse };
}

function lookup(query) {
  if (!dictIndexes) return [];
  const hits = new Set();
  query.toLowerCase().split(/[\s,?.!;:]+/).filter(t => t.length > 2).forEach(w => {
    if (dictIndexes.reverse[w]) dictIndexes.reverse[w].forEach(i => hits.add(i));
    Object.keys(dictIndexes.reverse).forEach(k => {
      if (k.includes(w) || w.includes(k)) dictIndexes.reverse[k].forEach(i => hits.add(i));
    });
    (dictIndexes.byWord[w] || []).forEach(i => hits.add(i));
  });
  return [...hits].slice(0, MAX_HITS).map(i => {
    const e = dictEntries[i];
    const cas = e.forms?.declension?.[0]?.cases || [];
    const f = n => cas.find(c => c.case === n);
    return {
      word: e.word, gender: e.gender || undefined, desc: e.desc || undefined,
      de: e.translations?.miks, en: e.translations?.engl, lt: e.translations?.leit,
      nom_sg: f("Nominative")?.singular, gen_sg: f("Genitive")?.singular,
      dat_sg: f("Dative")?.singular,     acc_sg: f("Accusative")?.singular,
      nom_pl: f("Nominative")?.plural,
      present: e.forms?.indicative?.[0]?.forms,
      past:    e.forms?.indicative?.[1]?.forms,
      imperative: e.forms?.imperative,
    };
  }).filter(e => e.de || e.en);
}

// ── System prompt ────────────────────────────────────────────────────────
function makeSystem(hits) {
  const block = hits.length
    ? "\n\n## Wörterbuch-Einträge für diese Antwort\n" + JSON.stringify(hits, null, 1)
    : "";
  return `Du bist ein Chatbot, der auf rekonstruiertem Neo-Preußisch (Altpreußisch) antwortet, gemäß der Rekonstruktion von Letas Palmaitis.

Regeln:
1. Nutze die Wörterbuch-Einträge unten für grammatisch korrekte Sätze. Verwende korrekte Kasus, Tempus und Numerus aus den bereitgestellten Formen.
2. Fülle lexikalische Lücken mit baltischen Kognaten (litauisch/lettisch), angepasst an altpreußische Phonologie.
3. Beende IMMER mit einer deutschen Übersetzung: [DE: …]
4. Bei unsicheren Formen: kurze Anmerkung (rekonstruiert: …)
5. 1–4 preußische Sätze. Warmer, leicht archaischer Ton.
6. Keine langen linguistischen Erklärungen — einfach sprechen.${block}`;
}

// ── API call ─────────────────────────────────────────────────────────────
async function callAPI(system) {
  const res = await fetch(PROXY_URL, {
    method: "POST",
    headers: { "Content-Type": "application/json" },
    body: JSON.stringify({
      model: "claude-sonnet-4-20250514",
      max_tokens: 1000,
      system,
      messages: history.map(({ role, content }) => ({ role, content })),
    }),
  });
  if (!res.ok) {
    const err = await res.json().catch(() => ({}));
    throw new Error(err.error?.message || `HTTP ${res.status}`);
  }
  const data = await res.json();
  return data.content?.filter(b => b.type === "text").map(b => b.text).join("\n") || "";
}

// ── UI helpers ───────────────────────────────────────────────────────────
const chat  = document.getElementById("chat");
const input = document.getElementById("input");
const btn   = document.getElementById("send");
const errEl = document.getElementById("error");
const status = document.getElementById("dict-status");

function clearEmpty() {
  const e = chat.querySelector(".empty");
  if (e) e.remove();
}

function addMsg(role, prussian, german, hits) {
  clearEmpty();
  const div = document.createElement("div");
  div.className = "msg " + (role === "user" ? "user" : "bot");
  if (role === "bot") {
    div.innerHTML = `<div class="avatar">🏺</div>
      <div class="bubble">
        <div>${prussian.replace(/\n/g, "<br>")}</div>
        ${german ? `<div class="translation">🇩🇪 ${german}</div>` : ""}
        ${hits > 0 ? `<div class="dict-hits">📖 ${hits} Wörterbucheinträge</div>` : ""}
      </div>`;
  } else {
    div.innerHTML = `<div class="bubble">${prussian}</div>`;
  }
  chat.appendChild(div);
  chat.scrollTop = chat.scrollHeight;
}

function showTyping() {
  const d = document.createElement("div");
  d.className = "typing"; d.id = "typing";
  d.innerHTML = `<span>🏺</span><span>Suche im Wörterbuch…</span>
    <div class="dots"><div class="dot"></div><div class="dot"></div><div class="dot"></div></div>`;
  chat.appendChild(d); chat.scrollTop = chat.scrollHeight;
}
function hideTyping() { document.getElementById("typing")?.remove(); }

function showError(msg) { errEl.textContent = "⚠ " + msg; errEl.style.display = "block"; }
function hideError()    { errEl.style.display = "none"; }

function parseMsg(text) {
  const m = text.match(/\[DE:\s*([\s\S]*?)\]$/m);
  return { prussian: text.replace(/\[DE:[\s\S]*?\]$/m, "").trim(), german: m?.[1]?.trim() };
}

function setUI(enabled) {
  input.disabled = !enabled; btn.disabled = !enabled || !input.value.trim();
}

// ── Send ─────────────────────────────────────────────────────────────────
async function send() {
  const text = input.value.trim();
  if (!text || busy) return;
  busy = true; hideError();
  input.value = ""; setUI(false);

  addMsg("user", text);
  history.push({ role: "user", content: text });

  const hits = lookup(text);
  showTyping();

  try {
    const raw = await callAPI(makeSystem(hits));
    hideTyping();
    const { prussian, german } = parseMsg(raw);
    history.push({ role: "assistant", content: raw });
    addMsg("bot", prussian, german, hits.length);
  } catch(e) {
    hideTyping(); showError(e.message);
    history.pop();
  }

  busy = false; setUI(true); input.focus();
}

btn.addEventListener("click", send);
input.addEventListener("keydown", e => { if (e.key === "Enter" && !e.shiftKey) send(); });
input.addEventListener("input", () => { btn.disabled = !input.value.trim() || busy; });

// ── Load dictionary ──────────────────────────────────────────────────────
fetch(DICT_URL)
  .then(r => { if (!r.ok) throw new Error("HTTP " + r.status); return r.json(); })
  .then(data => {
    dictEntries = Array.isArray(data) ? data : (data.words || data.entries || Object.values(data));
    dictIndexes = buildIndexes(dictEntries);
    status.style.color = "#5a9";
    status.textContent = "● Wörterbuch: " + dictEntries.length.toLocaleString() + " Einträge";
    setUI(true); input.focus();
  })
  .catch(e => {
    status.style.color = "#c55";
    status.textContent = "● Wörterbuch: Fehler – " + e.message;
    setUI(true); // noch ohne Wörterbuch nutzbar
  });
</script>
</body>
</html>
