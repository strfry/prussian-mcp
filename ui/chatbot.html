<!DOCTYPE html>
<html lang="de">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Prūsiskan Balsenis</title>
<style>
  * { box-sizing: border-box; margin: 0; padding: 0; }
  body {
    font-family: Georgia, serif;
    background: linear-gradient(160deg, #f7f0e2 0%, #ede2c8 100%);
    min-height: 100vh; display: flex; flex-direction: column;
    align-items: center;
  }
  #app {
    width: 100%; max-width: 700px; min-height: 100vh;
    display: flex; flex-direction: column;
  }
  header {
    background: linear-gradient(135deg, #3b2408, #6b3d11);
    color: #f5dfa0; padding: 16px 20px 12px;
    box-shadow: 0 2px 8px rgba(0,0,0,.3);
    display: flex; justify-content: space-between; align-items: flex-start;
  }
  header h1 { font-size: 21px; letter-spacing: 1px; }
  header .status {
    font-size: 11px;
    padding: 4px 8px;
    border-radius: 4px;
    background: rgba(0,0,0,0.2);
    font-family: sans-serif;
  }
  header .status.connecting { background: rgba(255,165,0,0.3); }
  header .status.connected { background: rgba(0,128,0,0.3); }
  header .status.disconnected { background: rgba(255,0,0,0.3); }
  #lang-selector { position: relative; }
  #lang-icon { font-size: 20px; cursor: pointer; user-select: none; transition: opacity .2s; }
  #lang-icon:hover { opacity: .7; }
  #lang-menu {
    display: none; position: absolute; top: 28px; right: 0;
    background: #2c1a06; border-radius: 8px; overflow: hidden;
    box-shadow: 0 4px 12px rgba(0,0,0,.4); z-index: 100;
    min-width: 120px;
  }
  #lang-menu.open { display: block; }
  #lang-menu button {
    display: block; width: 100%; text-align: left;
    background: none; border: none; color: #f5dfa0;
    padding: 10px 16px; cursor: pointer;
    font-family: sans-serif; font-size: 14px;
    transition: background .2s;
  }
  #lang-menu button:hover { background: rgba(255,255,255,.1); }
  #lang-menu button.active { background: #5a9; color: #2c1a06; font-weight: bold; }
  #chat { flex: 1; overflow-y: auto; padding: 16px 16px 8px; }
  .empty {
    text-align: center; color: #9a7a50; margin-top: 80px;
    font-style: italic; line-height: 1.9; font-size: 15px;
  }
  .empty .icon { font-size: 32px; margin-bottom: 10px; }
  .msg { display: flex; margin-bottom: 14px; }
  .msg.user { justify-content: flex-end; }
  .bubble {
    padding: 10px 15px; border-radius: 16px;
    max-width: 78%; font-size: 15px; line-height: 1.65;
  }
  .msg.user .bubble {
    background: #3b2408; color: #f5e8c8;
    border-radius: 16px 16px 4px 16px;
  }
  .msg.bot { align-items: flex-end; }
  .msg.bot .avatar { font-size: 22px; margin-right: 8px; }
  .msg.bot .bubble {
    background: white; border: 1px solid #c9a065;
    border-radius: 16px 16px 16px 4px;
    box-shadow: 0 1px 4px rgba(0,0,0,.08);
    color: #2c1a06;
  }
  .translation {
    margin-top: 10px; padding-top: 8px;
    border-top: 1px solid #edd9a0;
    color: #666; font-size: 13px;
    font-family: sans-serif; font-style: italic;
  }
  
  /* RAG Steps - visible by default */
  .rag-steps {
    margin-top: 12px;
    border: 1px solid #c9a065;
    border-radius: 8px;
    background: #fffdf5;
    overflow: hidden;
  }
  .rag-header {
    background: linear-gradient(135deg, #6b3d11, #8b5d21);
    color: #f5dfa0;
    padding: 8px 12px;
    font-size: 12px;
    font-family: sans-serif;
    font-weight: bold;
    cursor: pointer;
    display: flex;
    justify-content: space-between;
    align-items: center;
  }
  .rag-header:hover { background: #5a3510; }
  .rag-header .toggle { font-size: 10px; opacity: 0.7; }
  .rag-content {
    padding: 12px;
    display: none;
  }
  .rag-content.expanded { display: block; }
  .rag-turn {
    margin-bottom: 12px;
    border: 1px solid #e0d5c0;
    border-radius: 6px;
    overflow: hidden;
  }
  .rag-turn:last-child { margin-bottom: 0; }
  .rag-turn-header {
    background: #f5ede0;
    padding: 6px 10px;
    font-size: 11px;
    font-family: sans-serif;
    color: #6b3d11;
    font-weight: bold;
    display: flex;
    justify-content: space-between;
  }
  .rag-turn-content {
    padding: 8px 10px;
    font-size: 12px;
    font-family: 'Courier New', monospace;
    background: white;
  }
  .rag-tool-call {
    margin: 6px 0;
    padding: 8px;
    background: #f0f7ff;
    border-left: 3px solid #4a90d9;
    border-radius: 4px;
  }
  .rag-tool-name {
    font-weight: bold;
    color: #4a90d9;
    font-size: 11px;
    margin-bottom: 4px;
  }
  .rag-tool-args {
    font-size: 11px;
    color: #333;
    background: #e8f0f8;
    padding: 4px 8px;
    border-radius: 3px;
    word-break: break-all;
  }
  .rag-tool-result {
    margin-top: 6px;
    padding: 6px 8px;
    background: #f0fff0;
    border-left: 3px solid #5a9;
    border-radius: 4px;
    font-size: 11px;
    color: #2c1a06;
    max-height: 150px;
    overflow-y: auto;
  }
  .rag-tool-result .word-entry {
    padding: 3px 0;
    border-bottom: 1px solid #e0e0e0;
  }
  .rag-tool-result .word-entry:last-child { border-bottom: none; }
  .rag-tool-result .word-prussian {
    font-weight: bold;
    color: #6b3d11;
  }
  .rag-tool-result .word-german {
    color: #666;
    font-style: italic;
  }
  .rag-tool-result .empty-result {
    color: #999;
    font-style: italic;
  }
  .rag-final {
    margin-top: 10px;
    padding: 10px;
    background: #fffef5;
    border: 1px solid #c9a065;
    border-radius: 6px;
    font-size: 12px;
  }
  .rag-final-label {
    font-weight: bold;
    color: #6b3d11;
    font-size: 10px;
    text-transform: uppercase;
    margin-bottom: 4px;
  }
  
  .typing {
    display: flex; align-items: center; gap: 10px;
    color: #9a7050; font-style: italic;
    font-size: 14px; font-family: sans-serif;
    margin-bottom: 10px;
  }
  .dots { display: flex; gap: 3px; }
  .dot {
    width: 6px; height: 6px; border-radius: 50%;
    background: #c9a065; animation: pulse 1.2s ease-in-out infinite;
  }
  .dot:nth-child(2) { animation-delay: .2s; }
  .dot:nth-child(3) { animation-delay: .4s; }
  @keyframes pulse {
    0%,100% { opacity:.3; transform:scale(.8); }
    50%      { opacity:1;  transform:scale(1.2); }
  }
  #error {
    background: #fde8e8; border: 1px solid #e09090;
    border-radius: 8px; padding: 8px 12px;
    font-size: 13px; color: #a33; font-family: sans-serif;
    margin: 4px 0;
  }
  #input-row {
    display: flex; gap: 8px; padding: 8px 16px 16px;
  }
  #input-row input {
    flex: 1; padding: 11px 15px; border-radius: 12px;
    border: 1px solid #c9a065; font-size: 15px;
    background: #fffdf5; font-family: Georgia, serif;
    color: #2c1a06; outline: none;
  }
  #input-row input:disabled { opacity: .6; }
  #input-row button {
    background: #3b2408; color: #f5dfa0;
    border: none; border-radius: 12px;
    padding: 11px 20px; cursor: pointer;
    font-size: 15px; font-family: sans-serif;
    transition: background .2s;
  }
  #input-row button:disabled { background: #a08060; cursor: not-allowed; }
</style>
</head>
<body>

<div id="app">
  <header>
    <div>
      <h1>🏛 Kunstisks Intellekts</h1>
    </div>
    <div style="display:flex;align-items:center;gap:12px;">
      <span id="status" class="status connecting">Verbinde…</span>
      <div id="lang-selector">
        <div id="lang-icon">🇩🇪</div>
      <div id="lang-menu">
        <button data-lang="de">🇩🇪 Deutsch</button>
        <button data-lang="lt">🇱🇹 Lietuvių</button>
      </div>
    </div>
  </header>
  <div id="chat"></div>
  <div id="error" style="display:none;margin:0 16px"></div>
  <div id="rag-container"></div>
  <div id="input-row">
    <input id="input" type="text" disabled>
    <button id="send" disabled>➤</button>
  </div>
</div>

<script src="mcp-client.js"></script>
<script src="../lib/react-engine.js"></script>
<script>
let busy = false;
let currentLang = "de";
let conversationHistory = [];
let mcpClient = null;
let reactEngine = null;
let currentRagContainer = null;
let ragTurns = [];

const i18n = {
  de: {
    "intro.line1": "Sprich mich an — auf Deutsch, Litauisch oder Englisch.",
    "intro.line2": "Ich antworte auf Altpreußisch, mit deutscher Übersetzung.",
    "input.placeholder": "Schreib etwas auf Deutsch oder Englisch…",
    "typing": "Suche im Wörterbuch…",
    "error.prefix": "⚠ ",
    "rag.title": "📖 RAG Schritte",
    "rag.turn": "Schritt",
    "rag.final": "Finale Antwort",
    "rag.tool": "Tool Aufruf",
    "rag.result": "Ergebnis",
    "rag.empty": "Kein Ergebnis",
    "connecting": "Verbinde mit Server…",
    "connected": "Verbunden",
    "disconnected": "Getrennt"
  },
  lt: {
    "intro.line1": "Pakalbėk su manimi – vokiečių, lietuvių arba anglų kalba.",
    "intro.line2": "Aš atsakau senovės prūsų kalba su lietuvių vertimu.",
    "input.placeholder": "Parašyk ką nors vokiečių arba anglų kalba…",
    "typing": "Ieško žodyne…",
    "error.prefix": "⚠ ",
    "rag.title": "📖 RAG žingsniai",
    "rag.turn": "Žingsnis",
    "rag.final": "Galutinis atsakymas",
    "rag.tool": "Įrankio kvietimas",
    "rag.result": "Rezultatas",
    "rag.empty": "Nėra rezultato",
    "connecting": "Jungiamasi prie serverio…",
    "connected": "Prisijungta",
    "disconnected": "Atsijungta"
  }
};

function t(key) {
  return i18n[currentLang]?.[key] || i18n["de"]?.[key] || key;
}

function getLangIcon(lang) {
  return lang === "lt" ? "🇱🇹" : "🇩🇪";
}

function detectBrowserLanguage() {
  const stored = localStorage.getItem("preusDictLang");
  if (stored) return stored;
  const acceptLang = navigator.language || navigator.userLanguage || "";
  if (acceptLang.toLowerCase().startsWith("lt")) return "lt";
  if (acceptLang.toLowerCase().startsWith("de")) return "de";
  return "de";
}

const chat = document.getElementById("chat");
const input = document.getElementById("input");
const btn = document.getElementById("send");
const errEl = document.getElementById("error");
const langIcon = document.getElementById("lang-icon");
const langMenu = document.getElementById("lang-menu");
const langButtons = langMenu.querySelectorAll("button");
const statusEl = document.getElementById("status");
const ragContainer = document.getElementById("rag-container");

function clearEmpty() {
  const e = chat.querySelector(".empty");
  if (e) e.remove();
}

function showIntro() {
  clearEmpty();
  const intro = document.createElement("div");
  intro.className = "empty";
  intro.innerHTML = `<div class="icon">⚡</div>
    ${t("intro.line1")}<br>
    <span style="font-size:13px">${t("intro.line2")}</span>`;
  chat.appendChild(intro);
}

function addMsg(role, prussian, translation) {
  clearEmpty();
  const div = document.createElement("div");
  div.className = "msg " + (role === "user" ? "user" : "bot");

  if (role === "bot") {
    div.innerHTML = `<div class="avatar">🏺</div>
      <div class="bubble">
        <div>${prussian.replace(/\n/g, "<br>")}</div>
        ${translation ? `<div class="translation">${t("translation.prefix") || '🇩🇪'} ${translation}</div>` : ""}
      </div>`;
  } else {
    div.innerHTML = `<div class="bubble">${prussian}</div>`;
  }

  chat.appendChild(div);
  chat.scrollTop = chat.scrollHeight;
}

function initRagContainer() {
  ragContainer.innerHTML = '';
  ragTurns = [];
  
  currentRagContainer = document.createElement('div');
  currentRagContainer.className = 'rag-steps';
  currentRagContainer.innerHTML = `
    <div class="rag-header" onclick="toggleRagContent()">
      <span>${t("rag.title")}</span>
      <span class="toggle">▼</span>
    </div>
    <div class="rag-content expanded" id="rag-content"></div>
  `;
  ragContainer.appendChild(currentRagContainer);
}

function toggleRagContent() {
  const content = document.getElementById('rag-content');
  const toggle = currentRagContainer.querySelector('.toggle');
  content.classList.toggle('expanded');
  toggle.textContent = content.classList.contains('expanded') ? '▼' : '▶';
}

function addRagTurn(turnNum, toolCalls, content) {
  if (!currentRagContainer) return;
  
  const contentDiv = document.getElementById('rag-content');
  const turnDiv = document.createElement('div');
  turnDiv.className = 'rag-turn';
  
  let turnHtml = `
    <div class="rag-turn-header">
      <span>${t("rag.turn")} ${turnNum}</span>
      ${toolCalls?.length ? `<span>${toolCalls.length} tool call${toolCalls.length > 1 ? 's' : ''}</span>` : '<span>finale Antwort</span>'}
    </div>
    <div class="rag-turn-content">
  `;
  
  if (toolCalls?.length) {
    for (const tc of toolCalls) {
      const argsStr = tc.arguments ? JSON.stringify(tc.arguments, null, 2) : '{}';
      turnHtml += `
        <div class="rag-tool-call">
          <div class="rag-tool-name">${tc.name}()</div>
          <div class="rag-tool-args">${argsStr}</div>
        </div>
      `;
    }
  } else if (content) {
    turnHtml += `<div style="white-space:pre-wrap">${content.replace(/</g, '&lt;').replace(/>/g, '&gt;')}</div>`;
  }
  
  turnHtml += '</div>';
  turnDiv.innerHTML = turnHtml;
  contentDiv.appendChild(turnDiv);
  contentDiv.scrollTop = contentDiv.scrollHeight;
}

function addRagToolResult(result) {
  if (!currentRagContainer) return;
  
  const contentDiv = document.getElementById('rag-content');
  const lastTurn = contentDiv.lastElementChild;
  if (!lastTurn) return;
  
  const contentPart = lastTurn.querySelector('.rag-turn-content');
  
  const resultDiv = document.createElement('div');
  resultDiv.className = 'rag-tool-result';
  
  if (Array.isArray(result) && result.length > 0) {
    for (const entry of result.slice(0, 5)) {
      const word = entry.word || '?';
      const de = entry.de || '';
      const en = entry.en || '';
      resultDiv.innerHTML += `
        <div class="word-entry">
          <span class="word-prussian">${word}</span>
          <span class="word-german">${de}${de && en ? ' | ' : ''}${en}</span>
        </div>
      `;
    }
    if (result.length > 5) {
      resultDiv.innerHTML += `<div class="word-entry" style="color:#999;font-style:italic">...und ${result.length - 5} mehr</div>`;
    }
  } else if (Array.isArray(result) && result.length === 0) {
    resultDiv.innerHTML = `<span class="empty-result">${t("rag.empty")}</span>`;
  } else if (typeof result === 'object') {
    resultDiv.innerHTML = `<pre style="white-space:pre-wrap;font-size:10px">${JSON.stringify(result, null, 2).slice(0, 500)}</pre>`;
  } else {
    resultDiv.innerHTML = String(result).slice(0, 200);
  }
  
  contentPart.appendChild(resultDiv);
  contentDiv.scrollTop = contentDiv.scrollHeight;
}

function finalizeRagContainer(prussian, translation) {
  if (!currentRagContainer) return;
  
  const contentDiv = document.getElementById('rag-content');
  
  const finalDiv = document.createElement('div');
  finalDiv.className = 'rag-final';
  finalDiv.innerHTML = `
    <div class="rag-final-label">${t("rag.final")}</div>
    <div>${prussian.replace(/\n/g, '<br>')}</div>
    ${translation ? `<div style="margin-top:6px;color:#666;font-style:italic">${translation}</div>` : ''}
  `;
  contentDiv.appendChild(finalDiv);
}

function showTyping() {
  const d = document.createElement("div");
  d.className = "typing";
  d.id = "typing";
  d.innerHTML = `<span>🏺</span><span>${t("typing")}</span>
    <div class="dots"><div class="dot"></div><div class="dot"></div><div class="dot"></div></div>`;
  chat.appendChild(d);
  chat.scrollTop = chat.scrollHeight;
}

function hideTyping() {
  document.getElementById("typing")?.remove();
}

function showError(msg) {
  errEl.textContent = t("error.prefix") + msg;
  errEl.style.display = "block";
}

function hideError() {
  errEl.style.display = "none";
}

function setUI(enabled) {
  input.disabled = !enabled;
  btn.disabled = !enabled || !input.value.trim();
}

function updateUI() {
  langIcon.textContent = getLangIcon(currentLang);
  langButtons.forEach(b => {
    b.classList.toggle("active", b.dataset.lang === currentLang);
  });
  input.placeholder = t("input.placeholder");

  if (!chat.querySelector(".msg")) {
    showIntro();
  }
}

function updateStatus(status) {
  if (statusEl) {
    statusEl.textContent = status;
    statusEl.className = status.includes("Verbinde") ? "status connecting" :
                         status.includes("Verbunden") ? "status connected" : "status";
  }
}

async function send() {
  const text = input.value.trim();
  if (!text || busy) return;
  if (!mcpClient || !reactEngine) {
    showError("MCP not connected");
    return;
  }

  busy = true;
  hideError();
  input.value = "";
  setUI(false);

  addMsg("user", text);
  hideTyping();
  ragContainer.innerHTML = '';
  initRagContainer();

  try {
    const result = await reactEngine.sendMessage(text, currentLang, conversationHistory, {
      onTurnStart: ({ turn, message }) => {
        addRagTurn(turn, null, null);
      },
      onTurnEnd: ({ turn, content, toolCalls }) => {
        // Update turn header with tool calls if present
      },
      onToolCall: ({ name, arguments: args }) => {
        // Tool call already added in onTurnStart
      },
      onToolResult: ({ result }) => {
        addRagToolResult(result);
      },
      onContentDelta: () => {},
      onDone: () => {}
    });

    finalizeRagContainer(result.prussian, result.translation);
    
    addMsg("bot", result.prussian, result.translation);
    
    conversationHistory = [
      ...conversationHistory,
      { role: "user", content: text },
      { role: "assistant", content: result.prussian + (result.translation ? `\n\n[${currentLang.toUpperCase()}: ${result.translation}]` : '') }
    ];

  } catch (e) {
    ragContainer.innerHTML = '';
    showError(e.message);
  }

  busy = false;
  setUI(true);
  input.focus();
}

async function initMCP() {
  updateStatus(t("connecting"));

  try {
    mcpClient = new MCPClient('');
    await mcpClient.connect();

    reactEngine = new ReactEngine(mcpClient, 'http://localhost:8001/v3', 'eurollm-9b-instruct-int8');

    updateStatus(t("connected"));
    setUI(true);
    input.focus();

    console.log('[UI] MCP initialized successfully');
  } catch (err) {
    console.error('[UI] MCP init failed:', err);
    updateStatus(t("disconnected"));
    showError("Failed to connect to MCP server: " + err.message);
  }
}

langIcon.addEventListener("click", () => {
  langMenu.classList.toggle("open");
});

langButtons.forEach(btn => {
  btn.addEventListener("click", () => {
    const newLang = btn.dataset.lang;
    if (newLang !== currentLang) {
      currentLang = newLang;
      localStorage.setItem("preusDictLang", newLang);
      updateUI();
    }
    langMenu.classList.remove("open");
  });
});

btn.addEventListener("click", send);
input.addEventListener("keydown", e => {
  if (e.key === "Enter" && !e.shiftKey) send();
});
input.addEventListener("input", () => {
  btn.disabled = !input.value.trim() || busy;
});

currentLang = detectBrowserLanguage();
updateUI();
showTyping();
initMCP();
</script>
</body>
</html>
