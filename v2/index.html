<!DOCTYPE html>
<html lang="de">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Prußisches Wörterbuch</title>
    <style>
        * { box-sizing: border-box; }
        
        body {
            font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, sans-serif;
            max-width: 900px;
            margin: 0 auto;
            padding: 2rem 1rem;
            background: #f5f5f5;
            color: #333;
        }
        
        @media (prefers-color-scheme: dark) {
            body {
                background: #1a1a1a;
                color: #eee;
            }
        }
        
        header {
            text-align: center;
            margin-bottom: 3rem;
        }
        
        h1 {
            font-size: 2.5rem;
            font-family: Georgia, serif;
            color: #2c5f2d;
            margin: 0 0 0.5rem;
        }
        
        @media (prefers-color-scheme: dark) {
            h1 { color: #4a9d5f; }
        }
        
        .subtitle {
            color: #666;
            font-size: 1rem;
        }
        
        @media (prefers-color-scheme: dark) {
            .subtitle { color: #aaa; }
        }
        
        main {
            background: white;
            padding: 2rem;
            border-radius: 12px;
            box-shadow: 0 2px 12px rgba(0,0,0,0.08);
        }
        
        @media (prefers-color-scheme: dark) {
            main {
                background: #222;
                box-shadow: 0 2px 12px rgba(0,0,0,0.4);
            }
        }
        
        .stats {
            font-size: 0.9rem;
            color: #666;
            margin-bottom: 1.5rem;
            padding: 0.75rem;
            background: #f9f9f9;
            border-left: 3px solid #2c5f2d;
            border-radius: 4px;
        }
        
        @media (prefers-color-scheme: dark) {
            .stats {
                background: #2a2a2a;
                color: #aaa;
            }
        }
        
        .search-wrapper {
            position: relative;
            margin-bottom: 2rem;
        }
        
        #search-input {
            width: 100%;
            padding: 0.75rem 1rem;
            font-size: 1rem;
            border: 2px solid #ccc;
            border-radius: 8px;
            transition: all 0.2s;
            background: white;
            color: #333;
        }
        
        @media (prefers-color-scheme: dark) {
            #search-input {
                background: #333;
                color: #eee;
                border-color: #555;
            }
        }
        
        #search-input:focus {
            outline: none;
            border-color: #2c5f2d;
            box-shadow: 0 0 8px rgba(44, 95, 45, 0.2);
        }
        
        #loading {
            position: absolute;
            right: 1rem;
            top: 50%;
            transform: translateY(-50%);
            display: none;
            width: 20px;
            height: 20px;
            border: 2px solid #e0e0e0;
            border-top-color: #2c5f2d;
            border-radius: 50%;
            animation: spin 0.6s linear infinite;
        }
        
        @keyframes spin {
            to { transform: translateY(-50%) rotate(360deg); }
        }
        
        #results {
            display: flex;
            flex-direction: column;
            gap: 0.75rem;
        }
        
        .results-header {
            padding: 0.75rem;
            background: #f5f5f5;
            border-left: 3px solid #2c5f2d;
            border-radius: 4px;
            font-size: 0.9rem;
            color: #666;
        }
        
        @media (prefers-color-scheme: dark) {
            .results-header {
                background: #2a2a2a;
                color: #aaa;
            }
        }
        
        .entry {
            border: 1px solid #ddd;
            border-radius: 8px;
            overflow: hidden;
            background: white;
            transition: box-shadow 0.2s;
        }
        
        @media (prefers-color-scheme: dark) {
            .entry {
                background: #1f1f1f;
                border-color: #444;
            }
        }
        
        .entry:hover {
            box-shadow: 0 2px 8px rgba(0,0,0,0.1);
        }
        
        .entry-header {
            display: flex;
            align-items: center;
            gap: 1rem;
            padding: 0.75rem 1rem;
            background: #fafafa;
            cursor: pointer;
            user-select: none;
            border-bottom: 1px solid #eee;
        }
        
        @media (prefers-color-scheme: dark) {
            .entry-header {
                background: #2a2a2a;
                border-bottom-color: #333;
            }
        }
        
        .entry-header:hover {
            background: #f5f5f5;
        }
        
        @media (prefers-color-scheme: dark) {
            .entry-header:hover { background: #333; }
        }
        
        .entry-word {
            font-weight: 600;
            font-size: 1.1rem;
            color: #1a1a1a;
            min-width: 120px;
            font-family: Georgia, serif;
        }
        
        @media (prefers-color-scheme: dark) {
            .entry-word { color: #fff; }
        }
        
        .entry-en, .entry-de {
            flex: 1;
            color: #666;
            font-size: 0.9rem;
        }
        
        @media (prefers-color-scheme: dark) {
            .entry-en, .entry-de { color: #aaa; }
        }
        
        .entry-score {
            font-weight: 600;
            color: #2c5f2d;
            font-size: 0.85rem;
            min-width: 50px;
            text-align: right;
        }
        
        @media (prefers-color-scheme: dark) {
            .entry-score { color: #4a9d5f; }
        }
        
        .entry-toggle {
            color: #999;
            font-size: 0.8rem;
            transition: transform 0.2s;
        }
        
        .entry-details {
            padding: 1rem;
            background: #fafafa;
            border-top: 1px solid #eee;
        }
        
        @media (prefers-color-scheme: dark) {
            .entry-details {
                background: #2a2a2a;
                border-top-color: #333;
            }
        }
        
        .entry-table {
            width: 100%;
            border-collapse: collapse;
            font-size: 0.9rem;
        }
        
        .entry-table tr {
            border-bottom: 1px solid #eee;
        }
        
        @media (prefers-color-scheme: dark) {
            .entry-table tr { border-bottom-color: #333; }
        }
        
        .entry-table tr:last-child {
            border-bottom: none;
        }
        
        .entry-table td {
            padding: 0.5rem 0;
        }
        
        .entry-table td:first-child {
            font-weight: 600;
            color: #666;
            width: 100px;
        }
        
        @media (prefers-color-scheme: dark) {
            .entry-table td:first-child { color: #aaa; }
        }
        
        .entry-table code {
            background: #f0f0f0;
            padding: 0.25rem 0.5rem;
            border-radius: 3px;
            font-family: monospace;
            font-size: 0.85rem;
        }
        
        @media (prefers-color-scheme: dark) {
            .entry-table code {
                background: #333;
                color: #4a9d5f;
            }
        }
        
        .no-results, .error {
            padding: 1rem;
            border-radius: 8px;
            text-align: center;
            font-size: 0.95rem;
        }
        
        .no-results {
            background: #f0f0f0;
            border: 1px solid #ddd;
            color: #666;
        }
        
        @media (prefers-color-scheme: dark) {
            .no-results {
                background: #2a2a2a;
                border-color: #444;
                color: #aaa;
            }
        }
        
        .error {
            background: #fee;
            border: 1px solid #fcc;
            color: #c00;
        }
        
        @media (prefers-color-scheme: dark) {
            .error {
                background: #3a1f1f;
                border-color: #663333;
                color: #ff7777;
            }
        }
        
        footer {
            text-align: center;
            margin-top: 3rem;
            padding-top: 2rem;
            border-top: 1px solid #eee;
            font-size: 0.85rem;
            color: #999;
        }
        
        @media (prefers-color-scheme: dark) {
            footer {
                border-top-color: #333;
                color: #666;
            }
        }
    </style>
</head>
<body>
    <header>
        <h1>🌲 Prußisches Wörterbuch</h1>
        <p class="subtitle">Semantische Suche mit Embeddings</p>
    </header>
    
    <main>
        <div id="stats" class="stats">⏳ Lade...</div>
        
        <div class="search-wrapper">
            <input 
                type="text" 
                id="search-input" 
                placeholder="Suchterm eingeben (z.B. 'son', 'Tochter', 'семья')..."
                autocomplete="off"
            >
            <div id="loading" class="loading"></div>
        </div>
        
        <div id="results" class="results"></div>
    </main>
    
    <footer>
        <p>Prußisches Wörterbuch | FastAPI + Sentence Embeddings</p>
    </footer>
    
    <script src="frontend.js"></script>
</body>
</html>
